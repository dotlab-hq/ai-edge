name: Publish npm package

on:
    workflow_dispatch:
    push:
        tags:
            - "v*"

env:
    NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  lfs: true

            - name: Verify bundled Rampart model
              shell: bash
              run: |
                  test -f models/rampart/onnx/model_q4.onnx
                  test "$(stat -c%s models/rampart/onnx/model_q4.onnx)" -gt 1000000

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 20
                  registry-url: https://registry.npmjs.org

            - name: Typecheck
              run: bun run typecheck

            - name: Build package
              run: bun run build

            - name: Publish to npm
              run: npm publish --access public --provenance
